name: Update RRG data

# GitHub Actions cron is UTC only (and may fire 5-15 min late — acceptable).
# 00:41 UTC = 07:41 ICT (Thailand), after the latest US close (~04:00 ICT).
# The odd minute is deliberate: :00/:30 are GitHub's most congested slots and
# schedules there get delayed or silently dropped (the 00:30 cron never fired).
on:
  schedule:
    - cron: "41 0 * * *"   # daily        → Asset Detail
    - cron: "7 1 * * *"    # daily retry  → Asset Detail (no-op if 00:41 ran)
    - cron: "41 0 * * 6"   # Saturday     → Big Picture (weekly, after Fri close)
    - cron: "7 1 * * 6"    # Sat retry    → Big Picture (no-op if 00:41 ran)
  workflow_dispatch:
    inputs:
      view:
        description: Which view to update
        type: choice
        options: [both, bigpicture, assetdetail]
        default: both

permissions:
  contents: write
  issues: write

# Both crons fire at the same minute on Saturdays; one shared group +
# max-parallel below keeps the runs from racing each other's git push.
concurrency:
  group: update-rrg-data
  cancel-in-progress: false

jobs:
  plan:
    runs-on: ubuntu-latest
    outputs:
      views: ${{ steps.pick.outputs.views }}
    steps:
      - id: pick
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            case "${{ inputs.view }}" in
              both) views='["bigpicture","assetdetail"]' ;;
              *)    views='["${{ inputs.view }}"]' ;;
            esac
          elif [ "${{ github.event.schedule }}" = "41 0 * * 6" ] || \
               [ "${{ github.event.schedule }}" = "7 1 * * 6" ]; then
            views='["bigpicture"]'
          else
            views='["assetdetail"]'
          fi
          echo "views=$views" >> "$GITHUB_OUTPUT"
          echo "Will update: $views"

  update:
    needs: plan
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      matrix:
        view: ${{ fromJSON(needs.plan.outputs.views) }}
      max-parallel: 1
      fail-fast: false
    env:
      DATA_FILE: data_${{ matrix.view }}.json
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run offline unit tests
        run: pytest -q

      # Retry crons fire ~26 min after the primary; if the primary already
      # refreshed this view today, the retry tick exits without touching data.
      - name: Skip if already updated today (retry-cron dedupe)
        id: dedupe
        if: github.event_name == 'schedule'
        run: |
          gen=$(python -c "import json; print(json.load(open('$DATA_FILE'))['generated_at'][:10])" 2>/dev/null || echo none)
          if [ "$gen" = "$(date -u +%F)" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "$DATA_FILE already generated today ($gen) — nothing to do."
          fi

      - name: Generate and validate ${{ env.DATA_FILE }}
        id: gen
        if: steps.dedupe.outputs.skip != 'true'
        continue-on-error: true
        run: |
          set -euo pipefail
          python rrg_export.py --view "${{ matrix.view }}"
          python - "$DATA_FILE" <<'EOF'
          import json, sys
          from datetime import date, timedelta

          path = sys.argv[1]
          d = json.load(open(path))
          assets = d["assets"]
          assert assets, "no assets computed"
          for key, v in d["views"].items():
              assert v["symbols"], f"view {key} has no symbols"
              missing = [s for s in v["symbols"] if s not in assets]
              assert not missing, f"view {key} references missing assets {missing}"
          for sym, a in assets.items():
              assert len(a["tail"]) == d["params"]["tail_length"], f"{sym}: short tail"
              cur = a["current"]
              assert 80 < cur["ratio"] < 120 and 80 < cur["momentum"] < 120, \
                  f"{sym}: implausible coords {cur['ratio']}, {cur['momentum']}"
          staleness = date.today() - date.fromisoformat(d["data_end"])
          assert staleness <= timedelta(days=14), f"data_end stale by {staleness.days}d"
          print(f"OK: {path} — {len(assets)} assets, data through {d['data_end']}")
          EOF

      - name: Restore previous ${{ env.DATA_FILE }} on failure
        if: steps.gen.outcome == 'failure'
        run: |
          echo "::error::${{ matrix.view }} data generation failed — keeping previous $DATA_FILE"
          git checkout -- "$DATA_FILE" 2>/dev/null || true

      - name: Open alert issue on failure
        if: steps.gen.outcome == 'failure'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh label create rrg-data-failure --color D93F0B \
            --description "Automated RRG data refresh failed" --force
          title="RRG ${{ matrix.view }} update failed ($(date -u +%F))"
          body="Scheduled ${{ matrix.view }} refresh failed; the previous $DATA_FILE was kept.
          Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          Check yfinance availability / ticker changes, then re-run the workflow manually."
          existing=$(gh issue list --label rrg-data-failure --state open \
            --json number --jq '.[0].number // empty')
          if [ -n "$existing" ]; then
            gh issue comment "$existing" --body "$body"
          else
            gh issue create --title "$title" --body "$body" --label rrg-data-failure
          fi

      - name: Commit and push
        if: steps.gen.outcome == 'success'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "$DATA_FILE"
          if git diff --cached --quiet; then
            echo "No data changes; nothing to commit."
          else
            git commit -m "chore: update RRG ${{ matrix.view }} data ($(date -u +%F))"
            # another run may have pushed meanwhile — rebase then push
            git pull --rebase origin main
            git push
          fi

      - name: Mark job failed
        if: steps.gen.outcome == 'failure'
        run: exit 1
