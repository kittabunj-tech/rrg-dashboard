name: Update RRG data

on:
  schedule:
    # Every Saturday 07:30 ICT (Thailand, UTC+7) = 00:30 UTC
    - cron: "30 0 * * 6"
  workflow_dispatch: {}

permissions:
  contents: write
  issues: write

concurrency:
  group: update-rrg-data
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run offline unit tests
        run: pytest -q

      - name: Generate and validate data.json
        id: gen
        continue-on-error: true
        run: |
          set -euo pipefail
          python rrg_export.py
          python - <<'EOF'
          import json, sys
          from datetime import date, timedelta

          d = json.load(open("data.json"))
          assets = d["assets"]
          assert len(assets) >= 10, f"only {len(assets)} assets"
          for sym, a in assets.items():
              assert len(a["tail"]) == d["params"]["tail_length"], f"{sym}: short tail"
              cur = a["current"]
              assert 80 < cur["ratio"] < 120 and 80 < cur["momentum"] < 120, \
                  f"{sym}: implausible coords {cur['ratio']}, {cur['momentum']}"
          staleness = date.today() - date.fromisoformat(d["data_end"])
          assert staleness <= timedelta(days=14), f"data_end stale by {staleness.days}d"
          print(f"OK: {len(assets)} assets, data through {d['data_end']}")
          EOF

      - name: Restore previous data.json on failure
        if: steps.gen.outcome == 'failure'
        run: git checkout -- data.json 2>/dev/null || true

      - name: Open alert issue on failure
        if: steps.gen.outcome == 'failure'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh label create rrg-data-failure --color D93F0B \
            --description "Automated RRG data refresh failed" --force
          title="RRG data update failed ($(date -u +%F))"
          body="Scheduled data refresh failed; the previous data.json was kept.
          Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          Check yfinance availability / ticker changes, then re-run the workflow manually."
          existing=$(gh issue list --label rrg-data-failure --state open \
            --json number --jq '.[0].number // empty')
          if [ -n "$existing" ]; then
            gh issue comment "$existing" --body "$body"
          else
            gh issue create --title "$title" --body "$body" --label rrg-data-failure
          fi

      - name: Commit and push
        if: steps.gen.outcome == 'success'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data.json
          if git diff --cached --quiet; then
            echo "No data changes; nothing to commit."
          else
            git commit -m "chore: update RRG data ($(date -u +%F))"
            git push
          fi

      - name: Mark job failed
        if: steps.gen.outcome == 'failure'
        run: exit 1
